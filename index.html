<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="gb2312">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>黄梅暗7 ― 选择房间</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  min-height: 100dvh;
}

body {
  background: radial-gradient(ellipse at 50% 25%, #1a2a4a 0%, #0a0e1a 100%);
  font-family: 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
  overflow-y: auto;
  /* 安全区适配 */
  padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
           env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
}

/* 背景光晕 */
.bg-deco {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.bg-deco::before,
.bg-deco::after {
  content: '';
  position: absolute;
  border-radius: 50%;
}
.bg-deco::before {
  width: 70vw; height: 70vw;
  max-width: 400px; max-height: 400px;
  background: radial-gradient(circle, rgba(68,170,255,.12) 0%, transparent 70%);
  top: -15vw; left: -15vw;
}
.bg-deco::after {
  width: 60vw; height: 60vw;
  max-width: 360px; max-height: 360px;
  background: radial-gradient(circle, rgba(255,120,60,.1) 0%, transparent 70%);
  bottom: -12vw; right: -12vw;
}

/* 浮动牌 */
.float-cards {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.fc {
  position: absolute;
  width: 36px; height: 54px;
  border-radius: 5px;
  background: linear-gradient(135deg, #1e2e50, #2a3a60);
  border: 1px solid rgba(100,150,255,.18);
  opacity: .15;
  animation: floatUp linear infinite;
}
.fc:nth-child(1)  { left:  4%; animation-duration: 14s; animation-delay:  0s; }
.fc:nth-child(2)  { left: 14%; animation-duration: 18s; animation-delay: -3s; }
.fc:nth-child(3)  { left: 24%; animation-duration: 12s; animation-delay: -6s; }
.fc:nth-child(4)  { left: 36%; animation-duration: 20s; animation-delay: -1s; }
.fc:nth-child(5)  { left: 50%; animation-duration: 16s; animation-delay: -8s; }
.fc:nth-child(6)  { left: 62%; animation-duration: 13s; animation-delay: -4s; }
.fc:nth-child(7)  { left: 74%; animation-duration: 19s; animation-delay: -2s; }
.fc:nth-child(8)  { left: 86%; animation-duration: 15s; animation-delay: -7s; }
@keyframes floatUp {
  0%   { transform: translateY(105vh) rotate(-12deg); opacity: .04; }
  50%  { opacity: .18; }
  100% { transform: translateY(-10vh) rotate(18deg); opacity: .04; }
}

/* ===== 主体容器 ===== */
.lobby {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 520px;
  /* 上下留出安全余量，手机竖屏时内容能完整显示 */
  padding: clamp(20px, 6vh, 48px) clamp(14px, 5vw, 28px) clamp(20px, 5vh, 40px);
  min-height: 100dvh;
  justify-content: center;
}

/* ===== 标题 ===== */
.title-wrap {
  text-align: center;
  margin-bottom: clamp(20px, 5vh, 40px);
}
.title-main {
  font-size: clamp(32px, 9vw, 46px);
  font-weight: 900;
  letter-spacing: clamp(3px, 1vw, 6px);
  background: linear-gradient(135deg, #ffe082, #ffa726, #ff7043);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 2px 10px rgba(255,150,50,.45));
  line-height: 1.1;
}
.title-badge {
  display: inline-block;
  margin-top: 8px;
  font-size: clamp(11px, 3vw, 14px);
  color: rgba(255,255,255,.4);
  letter-spacing: 2px;
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 20px;
  padding: 3px 14px;
  background: rgba(255,255,255,.04);
}

/* ===== 房间列表 ===== */
.rooms {
  display: flex;
  flex-direction: column;
  gap: clamp(10px, 2.5vh, 16px);
  width: 100%;
}

/* ===== 房间卡片 ===== */
.room-card {
  position: relative;
  border-radius: clamp(14px, 4vw, 20px);
  padding: clamp(14px, 3.5vw, 22px) clamp(14px, 4vw, 24px);
  cursor: pointer;
  transition: transform .15s ease, box-shadow .15s ease;
  user-select: none;
  -webkit-user-select: none;
  overflow: hidden;
  border: 1px solid transparent;
  display: flex;
  align-items: center;
  gap: clamp(12px, 3.5vw, 20px);
  /* 手机端最小点击高度 */
  min-height: 80px;
  /* 防止点击时文字被选中 */
  touch-action: manipulation;
}
.room-card:active {
  transform: scale(.96);
  transition-duration: .08s;
}
/* 移除 hover（手机端 hover 会粘滞） */
@media (hover: hover) {
  .room-card:hover { transform: translateY(-2px); }
  .room-card:hover .room-arrow { opacity: .8; transform: translateX(4px); }
}

/* 高级房 */
.room-adv {
  background: linear-gradient(135deg, #1a1a3e 0%, #2d1b5e 55%, #1e2858 100%);
  border-color: rgba(180,100,255,.4);
  box-shadow: 0 4px 20px rgba(130,70,255,.22), inset 0 1px 0 rgba(255,255,255,.07);
}
/* 中级房 */
.room-mid {
  background: linear-gradient(135deg, #142814 0%, #1b4828 55%, #1a3018 100%);
  border-color: rgba(70,200,110,.38);
  box-shadow: 0 4px 20px rgba(50,170,90,.18), inset 0 1px 0 rgba(255,255,255,.06);
}
/* 初级房 */
.room-bas {
  background: linear-gradient(135deg, #281a0e 0%, #3c2210 55%, #281e0e 100%);
  border-color: rgba(230,160,50,.38);
  box-shadow: 0 4px 20px rgba(195,135,35,.18), inset 0 1px 0 rgba(255,255,255,.06);
}

/* 图标 */
.room-icon {
  width: clamp(44px, 12vw, 58px);
  height: clamp(44px, 12vw, 58px);
  border-radius: clamp(10px, 3vw, 14px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(22px, 6vw, 30px);
  flex-shrink: 0;
}
.room-adv .room-icon { background: rgba(160,90,255,.18); border: 1px solid rgba(160,90,255,.3); }
.room-mid .room-icon { background: rgba(50,190,90,.14);  border: 1px solid rgba(50,190,90,.25); }
.room-bas .room-icon { background: rgba(215,155,45,.14); border: 1px solid rgba(215,155,45,.25); }

/* 文字区 */
.room-info { flex: 1; min-width: 0; }
.room-name {
  font-size: clamp(16px, 4.5vw, 21px);
  font-weight: 700;
  letter-spacing: 2px;
  margin-bottom: 4px;
  white-space: nowrap;
}
.room-adv .room-name { color: #c084fc; }
.room-mid .room-name { color: #4ade80; }
.room-bas .room-name { color: #fbbf24; }

.room-desc {
  font-size: clamp(11px, 3vw, 12.5px);
  color: rgba(255,255,255,.48);
  line-height: 1.55;
  /* 手机竖屏较窄时允许文字换行 */
  word-break: break-all;
  overflow-wrap: break-word;
}
.room-label {
  display: inline-block;
  margin-top: 5px;
  font-size: clamp(10px, 2.6vw, 11.5px);
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 600;
  letter-spacing: .8px;
}
.room-adv .room-label { background: rgba(160,90,255,.18); color: #d8b4fe; border: 1px solid rgba(160,90,255,.3); }
.room-mid .room-label { background: rgba(50,190,90,.14);  color: #86efac; border: 1px solid rgba(50,190,90,.25); }
.room-bas .room-label { background: rgba(215,155,45,.14); color: #fde68a; border: 1px solid rgba(215,155,45,.25); }

/* 箭头 */
.room-arrow {
  font-size: clamp(16px, 4vw, 20px);
  opacity: .35;
  flex-shrink: 0;
  transition: opacity .15s, transform .15s;
}

/* ===== 底部说明 ===== */
.footer-note {
  margin-top: clamp(16px, 4vh, 28px);
  font-size: clamp(10px, 2.8vw, 12px);
  color: rgba(255,255,255,.2);
  text-align: center;
  line-height: 1.9;
}

/* ===== 入场动画 ===== */
.title-wrap { animation: fadeSlideDown .5s ease both; }
@keyframes fadeSlideDown {
  from { opacity: 0; transform: translateY(-16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.room-card:nth-child(1) { animation: fadeSlideUp .42s ease .06s both; }
.room-card:nth-child(2) { animation: fadeSlideUp .42s ease .16s both; }
.room-card:nth-child(3) { animation: fadeSlideUp .42s ease .26s both; }
.footer-note            { animation: fadeSlideUp .42s ease .36s both; }
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===== 横屏手机适配 ===== */
@media (max-height: 480px) and (orientation: landscape) {
  .lobby { min-height: auto; padding: 12px 16px 12px; justify-content: flex-start; }
  .title-wrap { margin-bottom: 12px; }
  .title-main { font-size: 26px; }
  .rooms { gap: 8px; }
  .room-card { min-height: 58px; padding: 10px 14px; }
  .room-icon { width: 38px; height: 38px; font-size: 18px; }
  .float-cards { display: none; }
}
</style>
</head>
<body>

<div class="bg-deco"></div>

<div class="float-cards">
  <div class="fc"></div><div class="fc"></div><div class="fc"></div>
  <div class="fc"></div><div class="fc"></div><div class="fc"></div>
  <div class="fc"></div><div class="fc"></div>
</div>

<div class="lobby">

  <div class="title-wrap">
    <div class="title-main">黄梅暗7</div>
    <div class="title-badge">选择对局房间</div>
  </div>

  <div class="rooms">

    <div class="room-card room-adv" onclick="enterRoom('advanced')">
      <div class="room-icon">?</div>
      <div class="room-info">
        <div class="room-name">高级房</div>
        <div class="room-desc">不推荐新手玩家，容易打击自信心</div>
        <div class="room-label">全知视角 ・ 高难度</div>
      </div>
      <div class="room-arrow">?</div>
    </div>

    <div class="room-card room-mid" onclick="enterRoom('medium')">
      <div class="room-icon">?</div>
      <div class="room-info">
        <div class="room-name">中级房</div>
        <div class="room-desc">老鸟来战！！！</div>
        <div class="room-label">策略推理 ・ 中等难度</div>
      </div>
      <div class="room-arrow">?</div>
    </div>

    <div class="room-card room-bas" onclick="enterRoom('basic')">
      <div class="room-icon">?</div>
      <div class="room-info">
        <div class="room-name">初级房</div>
        <div class="room-desc">适合新手熟悉规则</div>
        <div class="room-label">基础模式 ・ 入门难度</div>
      </div>
      <div class="room-arrow">?</div>
    </div>

  </div>

  <div class="footer-note">
    点击房间即可进入游戏 ・ 单机对战 4 人桌<br>
    游戏规则详见黄梅暗7规则文档
  </div>

</div>

<script>
function enterRoom(mode) {
  window.location.href = 'lobby.html?mode=' + mode;
}
</script>
</body>
</html>
